spring:
  datasource:
    url: ${TEST_DB_URL}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}
  cache:
    type: ${TEST_CACHE_TYPE}
  jpa:
    hibernate:
      ddl-auto: ${TEST_JPA_DDL_AUTO}
    properties:
      hibernate:
        dialect: ${TEST_HIBERNATE_DIALECT}
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
