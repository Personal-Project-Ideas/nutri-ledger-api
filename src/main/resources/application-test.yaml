spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/nutri_ledger_pg
    username: test_user
    password: test_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: test_pool
      minimum-idle: 1
      maximum-pool-size: 2
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  jackson:
    property-naming-strategy: SNAKE_CASE
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GCLOUD_CLIENT_ID}
            client-secret: ${GCLOUD_CLIENT_SECRET}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: ${GCLOUD_AUTH_URI}
            token-uri: ${GCLOUD_TOKEN_URI}
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub
