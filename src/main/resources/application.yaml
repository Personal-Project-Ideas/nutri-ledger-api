spring:
  application:
    name: ${APP_NAME}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  jackson:
    property-naming-strategy: SNAKE_CASE
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        '[physical_naming_strategy]': org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GCLOUD_CLIENT_ID}
            client-secret: ${GCLOUD_CLIENT_SECRET}
            # Must match exactly one "Authorized redirect URI" in Google Cloud Console (see OAUTH2_REDIRECT_URI in .env).
            redirect-uri: ${OAUTH2_REDIRECT_URI}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/user.birthday.read
        provider:
          google:
            authorization-uri: ${GCLOUD_AUTH_URI}
            token-uri: ${GCLOUD_TOKEN_URI}
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

# Post-OAuth redirect (browser): JWT cookie is set on this response.
app:
  auth:
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  oauth2:
    login-success-redirect: ${APP_OAUTH_LOGIN_SUCCESS_URL:http://localhost:3000/}
    login-failure-redirect: ${APP_OAUTH_LOGIN_FAILURE_URL:http://localhost:3000/login}
